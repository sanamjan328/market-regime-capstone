universe: SPY
start: "2000-01-01"
end: "2024-12-31"
interval: 1d
raw_dir: data/raw
processed_dir: data/processed

secondary:
  universe: BTC-USD
  start: "2018-01-01"
  end: "2024-12-31"
  interval: 1h
  enabled: true

cross_asset:
  - TLT
  - GLD
  - UUP   # DXY proxy
  - HYG
  - LQD

fred_series:
  VIXCLS: {lag_days: 1}
  T10Y2Y: {lag_days: 1}
  BAMLC0A0CM: {lag_days: 1}   # ICE BofA US Corporate Index Option-Adjusted Spread (proxy)
  TEDRATE: {lag_days: 1}

macro_lag_days_default: 1
